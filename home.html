<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Title</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet"
          href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css"
          integrity="sha384-BVYiiSIFeK1dGmJRAkycuHAHRg32OmUcww7on3RYdg4Va+PmSTsz/K68vbdEjh4u"
          crossorigin="anonymous">
    <link rel="stylesheet"
          href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap-theme.min.css"
          integrity="sha384-rHyoN1iRsVXV4nD0JutlnGaslCJuC7uwjduW9SVrLvRYooPp2bWYgmgJQIXwl/Sp"
          crossorigin="anonymous">
</head>
<body>
 <div>
    <nav class="navbar navbar-default navbar-inverse navbar-fixed-top">
        <div class="navbar-header">
            <button type="button" class="navbar-toggle" data-target=".navbar-collapse" data-toggle="collapse">
                <span class="icon-bar"></span>
                <span class="icon-bar"></span>
                <span class="icon-bar"></span>
            </button>
        </div>
        <div class="navbar-collapse collapse">
            <ul class="nav navbar-nav">
                <li><a href="#">Home</a></li>
                <li id="postJobBtn">
                    <a onclick="prof()">Post Job</a>
                </li>
                <li id="searchJobBtn">
                    <a onclick="searchjob()">Search Job</a>
                </li>
                <li id="yourPostsBtn">
                    <a onclick="yourPosts()">Your Posts</a>
                </li>
                <li>
                    <a onclick="logout()">Logout</a>
                </li>
            </ul>
        </div>
    </nav>
</div>
<div style="margin-top:5%; margin-left:1%">
    <h1>Welcome <span id="username"></span> !!!</h1>
</div>
</body>

<script>



window.onload = function(){

fetch('/checkUserType',{
    method:'POST'
})
.then(res => res.json())
.then(data => {

    if(!data.username){
        window.location.href = "login.html";
        return;
    }

    let name = data.username;
    name = name.charAt(0).toUpperCase() + name.slice(1);

    document.getElementById("username").innerText = name;

    if(data.usertype === "company"){
        document.getElementById("postJobBtn").style.display = "block";
        document.getElementById("yourPostsBtn").style.display = "block";
        document.getElementById("searchJobBtn").style.display = "none";
    } 
    else{
        document.getElementById("postJobBtn").style.display = "none";
        document.getElementById("yourPostsBtn").style.display = "none";
        document.getElementById("searchJobBtn").style.display = "block";
    }

});

};

function prof(){
    window.location.href = "postjob.html";
}

function searchjob(){
    window.location.href = "searchjob.html";
}

function yourPosts(){
    window.location.href = "yourposts.html";
}

function logout(){

fetch('/resetSession',{
    method:'POST'
})
.then(()=>{
    window.location.href = "login.html";
});

}

</script>

</html>
