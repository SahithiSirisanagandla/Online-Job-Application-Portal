
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Title</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet"
          href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css"
          integrity="sha384-BVYiiSIFeK1dGmJRAkycuHAHRg32OmUcww7on3RYdg4Va+PmSTsz/K68vbdEjh4u"
          crossorigin="anonymous">
    <link rel="stylesheet"
          href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap-theme.min.css"
          integrity="sha384-rHyoN1iRsVXV4nD0JutlnGaslCJuC7uwjduW9SVrLvRYooPp2bWYgmgJQIXwl/Sp"
          crossorigin="anonymous">
</head>
<body>
    

<h1 class="text-center">Welcome to ONLINE JOB APPLICATION PORTAL</h1>

<div class="container" style="margin-top: 15%">

    <div class="row justify-content-center">
        <div class="col-md-4 col-md-offset-4">

            <div class="form-login">
                <label>Username:</label>
                <input id="uname" type="text" placeholder="username" class="form-control input-md chat-input"/>
                <br>

                <label>Password:</label>
                <input id="password" type="password" placeholder="password" class="form-control input-md chat-input"/>
                <br>
                
                <div class="text-center">
                    <button onclick="verify()" class="btn btn-primary btn-block">Login</button>
                    <br>

                    <span style="color:black;background-color:aliceblue;">New Here?</span>
                    <br>

                    <button onclick="register()" class="btn btn-primary btn-block">Register</button>
                </div>

            </div>

            <br>

            <p id="errorMsg" style="color:red; display:none" class="text-center">
                Invalid login
            </p>

        </div>
    </div>
</div>
</body>
<script>

function verify(){

    let username = document.getElementById("uname").value.trim();
    let password = document.getElementById("password").value.trim();

    if(username === "" || password === ""){
        alert("Please enter username and password");
        return;
    }

    let obj = {
        username: username,
        password: password
    };

    fetch('/login',{
        method:'POST',
        headers:{
            'Content-Type':'application/json'
        },
        body: JSON.stringify(obj)
    })
    .then(res => res.json())
    .then(response => {

        if(response.A === "correct"){
            document.getElementById("errorMsg").style.display = "none";
            alert("Login successful");
            window.location.href = "home.html";
        }
        else{
            document.getElementById("errorMsg").style.display = "block";
        }

    })
    .catch(()=>{
        alert("Server error");
    });

}

function register(){
    window.location.href = "register.html";
}

</script>
</html>
